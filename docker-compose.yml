# Optional overrides: copy `.env.docker.example` to `.env.docker`, then run:
#   docker compose --env-file .env.docker up --build
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-AIzaSyCFiyOt5VkJBh8iR5vUCRs9kJQ427FF0-w}
        NEXT_PUBLIC_GOOGLE_PLACES_API_KEY: ${NEXT_PUBLIC_GOOGLE_PLACES_API_KEY:-AIzaSyCFiyOt5VkJBh8iR5vUCRs9kJQ427FF0-w}
    container_name: city-transit-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      API_BASE: ${API_BASE:-http://host.docker.internal:9081/city-transit-api}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:9081/city-transit-api}

trigger:
  branches:
    include:
      - dev

pr:
  branches:
    include:
      - dev

variables:
  - group: vg-aws-ecr

  - name: ECS_CLUSTER
    value: city-transit-ecs-cluster

  - name: ECS_SERVICE
    value: city-transit-dev-frontend-task-family-service

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self

  - bash: |
      set -euo pipefail

      echo "Docker version:"
      docker --version

      echo "Checking docker compose..."
      if docker compose version >/dev/null 2>&1; then
        docker compose version
      else
        echo "docker compose not found, installing compose plugin..."
        sudo apt-get update -y
        sudo apt-get install -y docker-compose-plugin
        docker compose version
      fi

      echo "Checking aws cli..."
      if aws --version >/dev/null 2>&1; then
        aws --version
      else
        echo "aws cli not found, installing..."
        sudo apt-get update -y
        sudo apt-get install -y awscli
        aws --version
      fi
    displayName: Ensure docker compose + awscli

  - bash: |
      set -euo pipefail

      export AWS_ACCESS_KEY_ID="$(AWS_ACCESS_KEY_ID)"
      export AWS_SECRET_ACCESS_KEY="$(AWS_SECRET_ACCESS_KEY)"
      export AWS_REGION="$(AWS_REGION)"

      ECR_REGISTRY="$(AWS_ACCOUNT_ID).dkr.ecr.$(AWS_REGION).amazonaws.com"
      echo "Logging in to: $ECR_REGISTRY"

      aws ecr get-login-password --region "$(AWS_REGION)" \
        | docker login --username AWS --password-stdin "$ECR_REGISTRY"
    displayName: Login to AWS ECR

  - bash: |
      set -euo pipefail

      export IMAGE_TAG="latest"

      echo "Validating docker-compose.ci.yml..."
      docker compose -f docker-compose.ci.yml config >/dev/null

      echo "Building image..."
      docker compose -f docker-compose.ci.yml build

      echo "Pushing image..."
      docker compose -f docker-compose.ci.yml push
    displayName: Build & Push latest image

  - bash: |
      set -euo pipefail

      export AWS_ACCESS_KEY_ID="$(AWS_ACCESS_KEY_ID)"
      export AWS_SECRET_ACCESS_KEY="$(AWS_SECRET_ACCESS_KEY)"
      export AWS_REGION="$(AWS_REGION)"

      echo "Deploying ECS service..."
      echo "Cluster: $(ECS_CLUSTER)"
      echo "Service: $(ECS_SERVICE)"

      aws ecs update-service \
        --region "$(AWS_REGION)" \
        --cluster "$(ECS_CLUSTER)" \
        --service "$(ECS_SERVICE)" \
        --force-new-deployment

      echo "Deploy completed."
    displayName: Deploy to ECS
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))